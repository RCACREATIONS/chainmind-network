# .github/workflows/build.yml
# ─────────────────────────────────────────────────────────────────────────────
# ChainMind Node — Cross-platform release builder
#
# Triggers:
#   • Every push to main      → builds all 4 artifacts (no release, for CI)
#   • Push of a version tag   → builds + creates GitHub Release + updates manifest
#   • Manual dispatch         → builds + creates GitHub Release + updates manifest
#
# Produces:
#   • ChainMind-Node-windows-x64.exe
#   • ChainMind-Node-macos-arm64.zip   (Apple Silicon .app bundle — M1/M2/M3)
#   • ChainMind-Node-linux-x64
#   • release/latest.json              (update manifest committed back to repo)
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Release

on:
  push:
    branches: ["main"]          # CI: build artifacts on every push (no release)
    tags:     ["v*.*.*"]        # Release: full publish on version tags
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.5.0 — no 'v' prefix)"
        required: false
        default: "0.0.0"

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Windows x64 ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install pyinstaller -r requirements.txt

      - name: Resolve version & write VERSION
        id: ver
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ github.event.inputs.version }}"
          }
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref_type }}" -ne "tag") {
            $sha = "${{ github.sha }}".Substring(0, 8)
            $ver = "dev-$sha"
          }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Set-Content -Path VERSION -Value $ver -NoNewline

      - name: Build EXE
        run: pyinstaller chainmind.spec --clean --noconfirm

      - name: Rename artifact
        shell: pwsh
        run: Move-Item dist\ChainMind-Node.exe "dist\ChainMind-Node-windows-x64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/ChainMind-Node-windows-x64.exe

  # ── macOS arm64 (Apple Silicon — M1/M2/M3, all Macs since late 2020) ────────
  build-macos-arm64:
    name: macOS arm64 (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install pyinstaller -r requirements.txt

      - name: Resolve version & write VERSION
        id: ver
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
          fi
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" != "tag" ]; then
            VER="dev-$(echo '${{ github.sha }}' | cut -c1-8)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          printf '%s' "$VER" > VERSION

      - name: Generate icon.icns from icon.png
        run: |
          if [ -f assets/icon.png ]; then
            mkdir -p icon.iconset
            sips -z 16   16   assets/icon.png --out icon.iconset/icon_16x16.png      >/dev/null
            sips -z 32   32   assets/icon.png --out icon.iconset/icon_16x16@2x.png   >/dev/null
            sips -z 32   32   assets/icon.png --out icon.iconset/icon_32x32.png      >/dev/null
            sips -z 64   64   assets/icon.png --out icon.iconset/icon_32x32@2x.png   >/dev/null
            sips -z 128  128  assets/icon.png --out icon.iconset/icon_128x128.png    >/dev/null
            sips -z 256  256  assets/icon.png --out icon.iconset/icon_128x128@2x.png >/dev/null
            sips -z 256  256  assets/icon.png --out icon.iconset/icon_256x256.png    >/dev/null
            sips -z 512  512  assets/icon.png --out icon.iconset/icon_256x256@2x.png >/dev/null
            sips -z 512  512  assets/icon.png --out icon.iconset/icon_512x512.png    >/dev/null
            sips -z 1024 1024 assets/icon.png --out icon.iconset/icon_512x512@2x.png >/dev/null
            iconutil -c icns icon.iconset -o assets/icon.icns
            rm -rf icon.iconset
            echo "icon.icns generated"
          else
            echo "No icon.png found — skipping icon.icns generation"
          fi

      - name: Build .app bundle
        run: pyinstaller chainmind.spec --clean --noconfirm

      - name: Zip .app bundle
        run: |
          cd dist
          zip -r "ChainMind-Node-macos-arm64.zip" "ChainMind Network.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/ChainMind-Node-macos-arm64.zip

  # ── Linux x64 ───────────────────────────────────────────────────────────────
  build-linux:
    name: Linux x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y binutils

      - name: Install Python dependencies
        run: pip install pyinstaller -r requirements.txt

      - name: Resolve version & write VERSION
        id: ver
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
          fi
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" != "tag" ]; then
            VER="dev-$(echo '${{ github.sha }}' | cut -c1-8)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          printf '%s' "$VER" > VERSION

      - name: Build binary
        run: pyinstaller chainmind.spec --clean --noconfirm

      - name: Rename artifact
        run: mv dist/ChainMind-Node dist/ChainMind-Node-linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: dist/ChainMind-Node-linux-x64

  # ── Publish GitHub Release + update manifest (tags + manual dispatch only) ───
  release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    needs: [build-windows, build-macos-arm64, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: ver
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Compute SHA-256 checksums
        id: checksums
        run: |
          WIN=$(sha256sum     dist/windows-x64/ChainMind-Node-windows-x64.exe | awk '{print $1}')
          MAC=$(sha256sum     dist/macos-arm64/ChainMind-Node-macos-arm64.zip  | awk '{print $1}')
          LNX=$(sha256sum     dist/linux-x64/ChainMind-Node-linux-x64          | awk '{print $1}')
          echo "win=$WIN" >> "$GITHUB_OUTPUT"
          echo "mac=$MAC" >> "$GITHUB_OUTPUT"
          echo "lnx=$LNX" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: ChainMind Node v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/windows-x64/ChainMind-Node-windows-x64.exe
            dist/macos-arm64/ChainMind-Node-macos-arm64.zip
            dist/linux-x64/ChainMind-Node-linux-x64

      - name: Update release/latest.json and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git reset --hard origin/main

          REPO="${{ github.repository }}"
          VER="${{ steps.ver.outputs.version }}"
          BASE="https://github.com/${REPO}/releases/download/v${VER}"

          mkdir -p release
          cat > release/latest.json << MANIFEST
          {
            "version": "${VER}",
            "changelog": "https://github.com/${REPO}/releases/tag/v${VER}",
            "assets": {
              "windows_x64":  "${BASE}/ChainMind-Node-windows-x64.exe",
              "macos_arm64":  "${BASE}/ChainMind-Node-macos-arm64.zip",
              "linux_x64":    "${BASE}/ChainMind-Node-linux-x64",
              "source":       "https://github.com/${REPO}/archive/refs/tags/v${VER}.zip"
            },
            "checksums": {
              "windows_x64":  "${{ steps.checksums.outputs.win }}",
              "macos_arm64":  "${{ steps.checksums.outputs.mac }}",
              "linux_x64":    "${{ steps.checksums.outputs.lnx }}",
              "source":       ""
            }
          }
          MANIFEST

          git add release/latest.json
          git diff --cached --quiet || git commit -m "chore: update manifest to v${VER}"
          git push origin HEAD:main
