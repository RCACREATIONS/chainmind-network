name: Build & Upload Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.4.1)'
        required: true

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install aiosqlite>=0.20 altair>=5.0 cryptography>=42.0 fastapi>=0.115 httpx>=0.27 numpy>=1.24 pandas>=2.0 Pillow>=10.0 plotly>=5.0 psutil>=5.9 pyarrow>=14.0 pydantic>=2.0 pyyaml>=6.0 rich streamlit>=1.35 "typer[all]" "uvicorn[standard]>=0.30" pystray gitpython tenacity validators

      - name: Build executable
        run: pyinstaller chainmind.spec --clean --noconfirm

      - name: Rename artifact
        run: |
          Move-Item dist\ChainMind-Node.exe dist\ChainMind-Node-windows-x64.exe
        shell: pwsh

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: dist/ChainMind-Node-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps
        run: sudo apt-get install -y libgirepository1.0-dev gir1.2-appindicator3-0.1 libayatana-appindicator3-dev || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install aiosqlite>=0.20 altair>=5.0 cryptography>=42.0 fastapi>=0.115 httpx>=0.27 numpy>=1.24 pandas>=2.0 Pillow>=10.0 plotly>=5.0 psutil>=5.9 pyarrow>=14.0 pydantic>=2.0 pyyaml>=6.0 rich streamlit>=1.35 "typer[all]" "uvicorn[standard]>=0.30" pystray gitpython tenacity validators

      - name: Build executable
        run: pyinstaller chainmind.spec --clean --noconfirm

      - name: Rename artifact
        run: mv dist/ChainMind-Node dist/ChainMind-Node-linux-x64 && chmod +x dist/ChainMind-Node-linux-x64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: dist/ChainMind-Node-linux-x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: macOS ARM64
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install aiosqlite>=0.20 altair>=5.0 cryptography>=42.0 fastapi>=0.115 httpx>=0.27 numpy>=1.24 pandas>=2.0 Pillow>=10.0 plotly>=5.0 psutil>=5.9 pyarrow>=14.0 pydantic>=2.0 pyyaml>=6.0 rich streamlit>=1.35 "typer[all]" "uvicorn[standard]>=0.30" pystray gitpython tenacity validators

      - name: Build executable
        run: pyinstaller chainmind.spec --clean --noconfirm

      - name: Package as zip
        run: |
          cd dist
          zip -r ChainMind-Node-macos-arm64.zip "ChainMind Network.app" 2>/dev/null || zip -r ChainMind-Node-macos-arm64.zip ChainMind-Node

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: dist/ChainMind-Node-macos-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
